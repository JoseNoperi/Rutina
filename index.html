<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutina</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f0f0f0;
}

header {
  background: #111;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin: 15px 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.dias {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.dias button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ddd;
}

.dias button.active {
  background: #111;
  color: white;
}

.tabla-comidas {
  width: 100%;
  border-collapse: collapse;
}

.tabla-comidas th {
  background: #111;
  color: white;
  padding: 10px;
}

.tabla-comidas td {
  border: 1px solid #ddd;
  padding: 10px;
}

.checklist label {
  display: block;
  margin: 6px 0;
}

/* PROGRESO */
.progress-box {
  margin-top: 10px;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #111;
  transition: 0.3s;
}

.progress-text {
  font-size: 12px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>Rutina</header>

<div class="container">

<div class="dias">
  <button onclick="cambiarDia('lunes')" class="active">L</button>
  <button onclick="cambiarDia('martes')">M</button>
  <button onclick="cambiarDia('miercoles')">Mi</button>
  <button onclick="cambiarDia('jueves')">J</button>
  <button onclick="cambiarDia('viernes')">V</button>
  <button onclick="cambiarDia('sabado')">S</button>
  <button onclick="cambiarDia('domingo')">D</button>
  <button onclick="cambiarDia('mandado')">🛒</button>
</div>

<div id="contenido"></div>

</div>

<script>

// ===== COMIDAS =====
function comidas(dia){
  const opciones = {
    lunes: ["Avena + huevo + plátano","Pollo + arroz + tortillas","Atún + tostadas"],
    martes: ["Huevos + pan + fruta","Carne + arroz","Pollo + papa"],
    miercoles: ["Avena + plátano","Pollo + arroz","Quesadillas + frijoles"],
    jueves: ["Huevos + tortilla","Carne + arroz","Atún + tostadas"],
    viernes: ["Avena + huevo","Casa: comida simple","Huevos + pan"],
    sabado: ["Huevos + pan","Trabajo","Cena ligera"],
    domingo: ["Desayuno libre","Comida familiar","Cena ligera"]
  };

  return `
  <div class="card">
    <h2>🍽️ Comidas</h2>
    <table class="tabla-comidas">
      <tr><th>Tiempo</th><th>Comida</th></tr>
      <tr><td>Desayuno</td><td>${opciones[dia][0]}</td></tr>
      <tr><td>Comida</td><td>${opciones[dia][1]}</td></tr>
      <tr><td>Cena</td><td>${opciones[dia][2]}</td></tr>
    </table>
  </div>`;
}

// ===== RUTINA =====
function rutina(dia){
  if(dia==="viernes"){
    return `<div class="card"><h2>🏠 Casa</h2>
    Flexiones 4x12<br>Abdomen 4x15<br>Sentadillas 4x15</div>`;
  }

  if(dia==="sabado" || dia==="domingo"){
    return `<div class="card"><h2>💼 Trabajo</h2>
    Actividad ligera</div>`;
  }

  const rutinas = ["PUSH","PULL","LEGS","PUSH"];
  return `<div class="card"><h2>🏋️ ${rutinas[["lunes","martes","miercoles","jueves"].indexOf(dia)]}</h2></div>`;
}

// ===== CHECKLIST + PROGRESO =====
function checklist(dia){

  const tareas = ["Desayuno","Comida","Cena","Actividad","2L agua"];

  let html = `
  <div class="card">
    <h2>✔ Checklist</h2>
    <div class="checklist">`;

  tareas.forEach((t,i)=>{
    const id = dia+"-"+i;
    html += `<label>
      <input type="checkbox" onchange="guardar('${id}')" id="${id}">
      ${t}
    </label>`;
  });

  html += `
    </div>

    <div class="progress-box">
      <div class="progress-bar">
        <div class="progress-fill" id="barra"></div>
      </div>
      <div class="progress-text" id="texto"></div>
    </div>

  </div>`;

  return html;
}

// ===== GUARDAR =====
function guardar(id){
  const el = document.getElementById(id);
  localStorage.setItem(id, el.checked);
  actualizarProgreso();
}

// ===== CARGAR =====
function cargar(dia){
  let total = 5;
  let completados = 0;

  for(let i=0;i<5;i++){
    const id = dia+"-"+i;
    const val = localStorage.getItem(id);

    if(val==="true"){
      document.getElementById(id).checked = true;
      completados++;
    }
  }

  actualizarBarra(completados,total);
}

// ===== PROGRESO =====
function actualizarProgreso(){
  let checks = document.querySelectorAll(".checklist input");
  let total = checks.length;
  let completados = 0;

  checks.forEach(c=>{
    if(c.checked) completados++;
  });

  actualizarBarra(completados,total);
}

function actualizarBarra(done,total){
  const porcentaje = (done/total)*100;
  document.getElementById("barra").style.width = porcentaje+"%";
  document.getElementById("texto").innerText = done+" / "+total+" completado";
}

// ===== MANDADO =====
function mandado(){
  return `<div class="card">
  <h2>🛒 Mandado</h2>
  <div class="checklist">
  <label><input type="checkbox"> 2kg pollo</label>
  <label><input type="checkbox"> 1kg arroz</label>
  <label><input type="checkbox"> 18 huevos</label>
  <label><input type="checkbox"> 4 atunes</label>
  <label><input type="checkbox"> tortillas</label>
  </div></div>`;
}

// ===== CAMBIAR DIA =====
function cambiarDia(dia){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  if(dia==="mandado"){
    document.getElementById("contenido").innerHTML = mandado();
    return;
  }

  document.getElementById("contenido").innerHTML =
    rutina(dia) + comidas(dia) + checklist(dia);

  setTimeout(()=>cargar(dia),100);
}

// INICIO
cambiarDia("lunes");

</script>

</body>
</html>

</body>
</html>
