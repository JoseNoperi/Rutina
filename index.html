<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutina</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f0f0f0;
}

header {
  background: #111;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin: 15px 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.dias {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.dias button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ddd;
  cursor: pointer;
  white-space: nowrap;
}

.dias button.active {
  background: #111;
  color: white;
}

.tabla-comidas {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.tabla-comidas th {
  background: #111;
  color: white;
  padding: 10px;
}

.tabla-comidas td {
  border: 1px solid #ddd;
  padding: 10px;
}

.checklist label {
  display: block;
  margin: 6px 0;
}

/* PROGRESO */
.progress-box {
  margin-top: 10px;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #111;
  transition: 0.3s;
}

.progress-text {
  font-size: 12px;
  margin-top: 5px;
}

button.reset {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #111;
  color: white;
}

/* Listas sin viñetas para mejor lectura (opcional para el skincare) */
.lista-skincare {
  padding-left: 20px;
  margin-top: 5px;
}

/* Títulos internos para el mandado */
.categoria-mandado {
  margin-top: 15px;
  margin-bottom: 5px;
  font-size: 16px;
  color: #333;
  border-bottom: 1px solid #eee;
  padding-bottom: 5px;
}
</style>
</head>

<body>

<header>Rutina</header>

<div class="container">

<div class="dias">
  <button onclick="cambiarDia('lunes')" class="active">Lunes</button>
  <button onclick="cambiarDia('martes')">Martes</button>
  <button onclick="cambiarDia('miercoles')">Miércoles</button>
  <button onclick="cambiarDia('jueves')">Jueves</button>
  <button onclick="cambiarDia('viernes')">Viernes</button>
  <button onclick="cambiarDia('sabado')">Sábado</button>
  <button onclick="cambiarDia('domingo')">Domingo</button>
  <button onclick="cambiarDia('mandado')">🛒 Mandado</button>
</div>

<div id="contenido"></div>

</div>

<script>

// ===== RUTINAS COMPLETAS (Sin cambios) =====
function rutina(dia){

if(dia==="lunes" || dia==="jueves"){
return `<div class="card">
<h2>🏋️ PUSH</h2>

<b>Pecho:</b>
<ul>
<li>Press banca plano – 4x8-12</li>
<li>Press inclinado – 4x8-12</li>
<li>Aperturas – 3x12</li>
</ul>

<b>Hombro:</b>
<ul>
<li>Press militar – 4x8-12</li>
<li>Elevaciones laterales – 4x12</li>
<li>Pájaros – 3x12</li>
</ul>

<b>Tríceps:</b>
<ul>
<li>Fondos – 3x10</li>
<li>Extensión polea – 3x12</li>
<li>Press cerrado – 3x10</li>
</ul>
</div>`;
}

if(dia==="martes"){
return `<div class="card">
<h2>🏋️ PULL</h2>

<b>Espalda:</b>
<ul>
<li>Dominadas – 4x8</li>
<li>Remo barra – 4x8-12</li>
<li>Jalón pecho – 3x12</li>
</ul>

<b>Bíceps:</b>
<ul>
<li>Curl barra – 4x10</li>
<li>Curl alterno – 3x12</li>
<li>Martillo – 3x12</li>
</ul>
</div>`;
}

if(dia==="miercoles"){
return `<div class="card">
<h2>🏋️ LEGS</h2>

<b>Pierna:</b>
<ul>
<li>Sentadilla – 4x8-12</li>
<li>Prensa – 4x10</li>
<li>Extensión – 3x12</li>
<li>Femoral – 3x12</li>
<li>Pantorrilla – 4x15</li>
</ul>
</div>`;
}

if(dia==="viernes"){
return `<div class="card">
<h2>🏠 Casa</h2>
<ul>
<li>Flexiones 4x12<br></li>
<li>Sentadillas 4x15<br></li>
<li>Abdomen 4x15</li>
</ul>
</div>`;
}

if(dia==="sabado" || dia==="domingo"){
return `<div class="card">
<h2>💼 Trabajo</h2>
Actividad ligera
</div>`;
}

}

// ===== COMIDAS (Sin cambios) =====
function comidas(dia){
const data = {
lunes:["80g avena + 2 huevos + 1 plátano","150g pollo + 150g arroz + verduras","120g atún + 2 tortillas + verduras"],
martes:["80g avena + 2 huevos + 1 manzana","150g carne molida + 150g arroz + verduras","120g pollo + 2 tortillas + verduras"],
miercoles:["80g avena + 2 huevos + 1 plátano","150g pollo + 150g arroz + verduras","120g atún + 2 tortillas + verduras"],
jueves:["80g avena + 2 huevos + 1 manzana","150g carne molida + 150g arroz + verduras","120g pollo + 2 tortillas + verduras"],
viernes:["80g avena + 2 huevos + 1 plátano","150g pollo + 150g arroz + verduras","120g atún + 2 tortillas + verduras"],
sabado:["80g avena + 2 huevos + 1 plátano","150g carne molida + 150g arroz + verduras","120g pollo + 2 tortillas + verduras"],
domingo:["80g avena + 2 huevos + fruta","150g pollo o carne + 150g arroz + verduras","120g atún o pollo + 2 tortillas + verduras"]
};

return `<div class="card">
<h2>🍽️ Comidas</h2>
<table class="tabla-comidas">
<tr><th>Tiempo</th><th>Comida</th></tr>
<tr><td>Desayuno</td><td>${data[dia][0]}</td></tr>
<tr><td>Comida</td><td>${data[dia][1]}</td></tr>
<tr><td>Cena</td><td>${data[dia][2]}</td></tr>
</table>
</div>`;
}

// ===== SKINCARE (Sin cambios) =====
function skincare(dia){
  let pasoHielo = "";
  if(dia === "martes" || dia === "jueves" || dia === "sabado"){
    pasoHielo = `<li><b>Agua fría → Sumergir la cara en agua con hielo 1–2 minutos</b></li>`;
  }

  return `<div class="card">
  <h2>🧴 Skincare</h2>
  
  <b>🌅 MAÑANA (TODOS LOS DÍAS)</b>
  <ul class="lista-skincare">
    <li>Lavarse los dientes</li>
    <li>Lavar cara</li>
    ${pasoHielo}
    <li>Secar cara</li>
    <li>Aplicar gotas para ojeras</li>
    <li>Aplicar minoxidil en la barba</li>
    <li>Crema hidratante</li>
    <li>Protector solar</li>
  </ul>
  
  <br>
  
  <b>🌙 NOCHE (TODOS LOS DÍAS)</b>
  <ul class="lista-skincare">
    <li>Lavarse los dientes</li>
    <li>Lavar cara</li>
    <li>Secar cara</li>
    <li>Aplicar minoxidil en la barba</li>
    <li>Crema hidratante</li>
  </ul>
  </div>`;
}

// ===== CHECKLIST (Sin cambios) =====
function checklist(dia){

const tareas = [
"Rutina cara mañana",
"Desayuno",
"Comida",
"Snack",
"Gym / Actividad",
"Cena",
"Rutina cara noche",
"2L agua"
];

let html = `<div class="card"><h2>✔ Checklist</h2><div class="checklist">`;

tareas.forEach((t,i)=>{
let extra = "";

if(t.includes("cara") && (dia==="martes" || dia==="jueves" || dia==="sabado")){
extra = " (hielo)";
}

html += `<label>
<input type="checkbox" id="${dia}-${i}" onchange="guardar('${dia}-${i}')">
${t}${extra}
</label>`;
});

html += `</div>

<div class="progress-box">
<div class="progress-bar"><div class="progress-fill" id="barra"></div></div>
<div class="progress-text" id="texto"></div>
</div>

<button class="reset" onclick="resetSemana()">Reiniciar semana</button>

</div>`;

return html;
}

// ===== GUARDAR =====
function guardar(id){
localStorage.setItem(id, document.getElementById(id).checked);
actualizarProgreso();
}

// ===== CARGAR =====
function cargar(dia){
let total = 8;
let done = 0;

for(let i=0;i<8;i++){
let id = dia+"-"+i;
if(localStorage.getItem(id)==="true"){
document.getElementById(id).checked = true;
done++;
}
}

actualizarBarra(done,total);

// reset automático domingo
if(dia==="domingo" && done===8){
resetSemana();
}
}

// ===== PROGRESO =====
function actualizarProgreso(){
let checks = document.querySelectorAll(".checklist input");
let total = checks.length;
let done = 0;

checks.forEach(c=>{ if(c.checked) done++; });

actualizarBarra(done,total);
}

function actualizarBarra(done,total){
let pct = (done/total)*100;
document.getElementById("barra").style.width = pct+"%";
document.getElementById("texto").innerText = done+" / "+total;
}

// ===== RESET =====
function resetSemana(){
localStorage.clear();
alert("Semana reiniciada");
location.reload();
}

// ===== MANDADO (NUEVA SECCIÓN CATEGORIZADA) =====
function mandado(){
return `<div class="card">
<h2>🛒 Mandado semanal</h2>

<h3 class="categoria-mandado">🥩 Principal (Proteínas)</h3>
<div class="checklist">
  <label><input type="checkbox"> 2-3 kg de Pollo</label>
  <label><input type="checkbox"> 1 kg de Carne molida</label>
  <label><input type="checkbox"> 30 Huevos</label>
  <label><input type="checkbox"> 5-6 latas de Atún</label>
</div>

<h3 class="categoria-mandado">🌾 Despensa (Carbohidratos y Grasas)</h3>
<div class="checklist">
  <label><input type="checkbox"> 1 kg de Arroz</label>
  <label><input type="checkbox"> 1 kg de Avena</label>
  <label><input type="checkbox"> 2-3 paquetes de Tortillas</label>
  <label><input type="checkbox"> 1 frasco de Crema de cacahuate</label>
</div>

<h3 class="categoria-mandado">🍎 Frutas</h3>
<div class="checklist">
  <label><input type="checkbox"> 7-10 Plátanos</label>
  <label><input type="checkbox"> 5-7 Manzanas</label>
</div>

<h3 class="categoria-mandado">🥦 Verduras (Elige 2 o 3 para la semana)</h3>
<div class="checklist">
  <label><input type="checkbox"> Brócoli o Coliflor</label>
  <label><input type="checkbox"> Calabacitas o Zanahorias</label>
  <label><input type="checkbox"> Tomate y Cebolla (básico para guisar)</label>
  <label><input type="checkbox"> Lechuga o Espinacas</label>
  <label><input type="checkbox"> Champiñones o Ejotes</label>
</div>

</div>`;
}

// ===== CAMBIO DIA =====
function cambiarDia(dia){
document.querySelectorAll(".dias button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(dia==="mandado"){
document.getElementById("contenido").innerHTML = mandado();
return;
}

// Aquí se inyecta el skincare antes del checklist
document.getElementById("contenido").innerHTML =
rutina(dia) + comidas(dia) + skincare(dia) + checklist(dia);

setTimeout(()=>cargar(dia),100);
}

// INICIO
cambiarDia("lunes");

</script>

</body>
</html>
